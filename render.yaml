# BarakaHub - Render Blueprint
# Defines the backend API service and PostgreSQL database

databases:
  - name: barakahub-db
    plan: free
    databaseName: barakahub
    ipAllowList: []

services:
  - type: web
    name: barakahub-api
    env: docker
    plan: free
    dockerfilePath: ./barakahub-backend/Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: barakahub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        value: https://barakahub.pages.dev
      - key: APP_NAME
        value: BarakaHub
      - key: PORT
        value: "10000"
      - key: REDIS_URL
        value: "redis://localhost:6379"  # Replace with Upstash Redis if needed
