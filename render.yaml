databases:
  - name: barakahub-db
    plan: free
    databaseName: barakahub
    ipAllowList: []

services:
  - type: web
    name: barakahub-api
    runtime: node
    plan: free
    buildCommand: cd barakahub-backend && npm install && npx prisma generate && npm run build
    startCommand: cd barakahub-backend && npx prisma db push & node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: barakahub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        value: https://barakahub.pages.dev
      - key: APP_NAME
        value: BarakaHub
      - key: PORT
        value: "10000"
